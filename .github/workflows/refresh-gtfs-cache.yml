name: Refresh GTFS cache

on:
  schedule:
    # Every Monday at 02:00 UTC (~12:00 Melbourne in winter, 13:00 in summer).
    - cron: "0 2 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Rebuild gtfs_cache.json
        env:
          GTFS_API_KEY: ${{ secrets.GTFS_API_KEY }}
        run: npm run build:cache

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- data/gtfs_cache.json; then
            echo "No cache changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/gtfs_cache.json
          git commit -m "Refresh GTFS cache (scheduled)"
          git push
